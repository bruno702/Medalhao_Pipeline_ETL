name: CI/ Medalhao_Pipeline_ETL

on:
  push:
    branches: [ "main", "dev"]
  pull_request:
    branches: [ "main", "dev"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validacao simples
        run: |
          echo "CI rodando com sucesso"

          - name: Valida estrutura da pasta pipeline (mínimo 5 pastas)
          run: |
            test -d pipeline || { echo "Pasta pipeline não encontrada"; exit 1; }
            QTD=$(find pipeline -mindepth 1 -maxdepth 1 -type d | wc -l)
            echo "Pastas encontradas: $QTD"
            if [ "$QTD" -ge 5 ]; then
              echo "Estrutura OK"
            else
              echo "Estrutura inválida: precisa ter pelo menos 5 pastas"
              exit 1
            fi