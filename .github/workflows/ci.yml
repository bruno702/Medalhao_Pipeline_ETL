name: CI/Medalhao_Pipeline_ETL

on:
  push:
    branches: ["main","dev"]
  pull_request:
    branches: ["main","dev"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # 0️ Checkout do código do repositório
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # 1️ Setup Python 3.11
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # -----------------------------
      # 2️ Instalar dependências
      # -----------------------------
      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install jupyter papermill pandas numpy

      # -----------------------------
      # 3️ Mensagem inicial
      # -----------------------------
      - name: Start CI
        run: echo "Starting CI for Medalhao Pipeline ETL"

      # -----------------------------
      # 4️ Definir notebooks com paths relativos (funciona no GitHub Actions)
      # -----------------------------
      - name: Define notebooks
        run: |
          set -e
          NOTEBOOKS=(
            "pipeline/01_orquestrador/00_orquestrador.ipynb"
            "pipeline/02_ingestao_bronze/01_ingestao_bronze.ipynb"
            "pipeline/03_tratamento_silver/02_bronze_para_silver.ipynb"
            "pipeline/03_tratamento_silver/03_SilverRobusto.ipynb"
            "pipeline/04_silver_para_gold/04_silver_para_gold.ipynb"
            "pipeline/05_qualidade/05_qualidade_e_alertas.ipynb"
          )

          # Verifica se todos os notebooks existem
          MISSING=()
          for nb in "${NOTEBOOKS[@]}"; do
            if [ ! -f "$nb" ]; then
              MISSING+=("$nb")
            fi
          done

          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "ERROR: Missing notebooks:"
            printf '%s\n' "${MISSING[@]}"
            exit 1
          else
            echo "All notebooks found!"

      # -----------------------------
      # 5️ Criar pasta de saída
      # -----------------------------
      - name: Create output folder
        run: mkdir -p output

      # -----------------------------
      # 6️ Executar todos os notebooks com papermill
      # -----------------------------
      - name: Execute notebooks
        run: |
          set -e
          for nb in "${NOTEBOOKS[@]}"; do
            echo "Running notebook: $nb"
            papermill "$nb" "output/$(basename $nb)" \
              --progress-bar \
              --log-output
          done

      # -----------------------------
      # 7️ Mensagem final de sucesso
      # -----------------------------
      - name: CI finished
        run: echo "CI completed successfully. All notebooks executed from GitHub clone paths."