name: CI/Medalhao_Pipeline_ETL

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      #  Pega o código do repositório
      - name: Checkout code
        uses: actions/checkout@v4

      #  Configura Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      #  Instala dependências
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyter papermill pandas numpy

      #  Mensagem inicial do CI
      - name: Start CI
        run: echo "Starting CI for Medalhao Pipeline ETL"

      #  Verifica pasta pipeline
      - name: Verify pipeline folder
        run: |
          if [ -d "pipeline" ]; then
            echo "Pipeline folder exists."
          else
            echo "Pipeline folder NOT found!"
            exit 1
          fi

      #  Verifica todos os notebooks
      - name: Verify notebooks
        run: |
          NOTEBOOKS=(
            "01_orquestrador/00_orquestrador.ipynb"
            "02_ingestao_bronze/01_ingestao_bronze.ipynb"
            "03_tratamento_silver/02_bronze_para_silver.ipynb"
            "03_tratamento_silver/03_SilverRobusto.ipynb"
            "04_silver_para_gold/04_silver_para_gold.ipynb"
            "05_qualidade/05_qualidade_e_alertas.ipynb"
          )

          MISSING=()
          for nb in "${NOTEBOOKS[@]}"; do
            if [ ! -f "pipeline/$nb" ]; then
              MISSING+=("$nb")
            fi
          done

          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "Missing notebooks:"
            printf '%s\n' "${MISSING[@]}"
            exit 1
          else
            echo "All notebooks found!"
          fi

      #  Cria pasta de saída para notebooks executados
      - name: Create output folder
        run: mkdir -p output

      #  Executa todos os notebooks
      - name: Execute notebooks
        run: |
          for nb in "${NOTEBOOKS[@]}"; do
            echo "Running notebook: $nb"
            papermill "pipeline/$nb" "output/$(basename $nb)"
          done

      # 9️⃣ Mensagem final do CI
      - name: CI finished
        run: echo "CI completed successfully"
