name: CI/Medalhao_Pipeline_ETL

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️ Pega o código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2️ Mensagem inicial do CI
      - name: Início do CI
        run: echo " Iniciando CI do pipeline Medalhao_Pipeline_ETL"

      # 3️ Verifica se a pasta pipeline existe
      - name: Verifica pasta pipeline
        run: |
          CAMINHO="pipeline"
          if [ -d "$CAMINHO" ]; then
            echo " Pasta pipeline encontrada em $CAMINHO"
          else
            echo " Pasta pipeline NÃO encontrada em $CAMINHO"
          fi

      # 4️ Verifica se todos os notebooks existem
      - name: Verifica notebooks
        run: |
          NOTEBOOKS=(
            "01_orquestrador/00_orquestrador.ipynb"
            "02_ingestao_bronze/01_ingestao_bronze.ipynb"
            "03_tratamento_silver/02_bronze_para_silver.ipynb"
            "03_tratamento_silver/03_SilverRobusto.ipynb"
            "04_silver_para_gold/04_silver_para_gold.ipynb"
            "05_qualidade/05_qualidade_e_alertas.ipynb"
          )

          for nb in "${NOTEBOOKS[@]}"; do
            if [ -f "pipeline/$nb" ]; then
              echo " Notebook encontrado: $nb"
            else
              echo " Notebook NÃO encontrado: $nb"
            fi
          done

      # 5️ Mensagem de finalização
      - name: CI finalizado
        run: echo " CI do pipeline finalizado com sucesso"