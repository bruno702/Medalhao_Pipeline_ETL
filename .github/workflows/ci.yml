name: CI/Medalhao_Pipeline_ETL

on:
  push:
    branches: ["main","dev"]
  pull_request:
    branches: ["main","dev"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyter papermill pandas numpy

      - name: Define notebooks
        run: |
          NOTEBOOKS=(
            "pipeline/01_orquestrador/00_orquestrador.ipynb"
            "pipeline/02_ingestao_bronze/01_ingestao_bronze.ipynb"
            "pipeline/03_tratamento_silver/02_bronze_para_silver.ipynb"
            "pipeline/03_tratamento_silver/03_SilverRobusto.ipynb"
            "pipeline/04_silver_para_gold/04_silver_para_gold.ipynb"
            "pipeline/05_qualidade/05_qualidade_e_alertas.ipynb"
          )

          MISSING=()
          for nb in "${NOTEBOOKS[@]}"; do
            if [ ! -f "$nb" ]; then
              MISSING+=("$nb")
            fi
          done

          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "WARNING: Missing notebooks (skipping them):"
            printf '%s\n' "${MISSING[@]}"
          fi

      - name: Create output folder
        run: mkdir -p output

      - name: Execute notebooks
        run: |
          for nb in "${NOTEBOOKS[@]}"; do
            if [ -f "$nb" ]; then
              echo "Running notebook: $nb"
              papermill "$nb" "output/$(basename $nb)" --progress-bar --log-output || echo "Notebook $nb failed, continuing..."
            else
              echo "Skipping missing notebook: $nb"
            fi
          done

      - name: CI finished
        run: echo "CI completed. Notebooks executed where possible."