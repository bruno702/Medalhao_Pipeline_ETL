name: CD/Medalhao_Pipeline_ETL

# Dispara automaticamente quando o CI termina
on:
  workflow_run:
    workflows: ["CI/Medalhao_Pipeline_ETL"]
    types:
      - completed

jobs:
  deploy:
    # Só roda se o CI terminou com sucesso e branch é dev ou main
    if: ${{ github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'dev' || github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest

    steps:
      # 1️ Checkout do código no commit que passou no CI
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # 2️ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3️ Instala dependências
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4️ Define input_path (pode ser ajustado para artefatos do CI futuramente)
      - name: Define input_path
        run: |
          INPUT_PATH="/Volumes/saas_project/core/landing/crypto_sentiment_prediction_dataset.csv"
          echo "INPUT_PATH=$INPUT_PATH" >> $GITHUB_ENV
          echo "Input path definido: $INPUT_PATH"

      # 5️ Dispara o Job no Databricks
      - name: Trigger Databricks Job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_JOB_ID: ${{ secrets.DATABRICKS_JOB_ID }}
          INPUT_PATH: ${{ env.INPUT_PATH }}
        run: |
          echo "Disparando Job $DATABRICKS_JOB_ID no Databricks com input_path=$INPUT_PATH"

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"job_id\": ${DATABRICKS_JOB_ID}, \"notebook_params\": {\"input_path\": \"${INPUT_PATH}\"}}" \
            "${DATABRICKS_HOST}/api/2.1/jobs/run-now")

          echo "Resposta Databricks: $RESPONSE"

          # Extrai run_id de forma segura
          RUN_ID=$(echo "$RESPONSE" | python -c "import sys, json; print(json.load(sys.stdin).get('run_id', ''))")
          if [ -z "$RUN_ID" ]; then
            echo "Erro: Não foi possível extrair run_id do Databricks. Saindo..."
            exit 1
          fi
          echo "Run ID: $RUN_ID" > run_id.txt

      # 6️ Espera o Job finalizar e verifica resultado
      - name: Wait for Databricks Job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          STATUS="PENDING"
          echo "Aguardando finalização do Job no Databricks..."

          # Loop de verificação
          while [ "$STATUS" = "RUNNING" ] || [ "$STATUS" = "PENDING" ]; do
            sleep 10
            STATUS=$(curl -s \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              "${DATABRICKS_HOST}/api/2.1/jobs/runs/get?run_id=$(cat run_id.txt)" | \
              python -c "import sys, json; print(json.load(sys.stdin)['state']['life_cycle_state'])")
            echo "Status atual: $STATUS"
          done

          # Checa o resultado final
          FINAL_STATUS=$(curl -s \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            "${DATABRICKS_HOST}/api/2.1/jobs/runs/get?run_id=$(cat run_id.txt)" | \
            python -c "import sys, json; print(json.load(sys.stdin)['state'].get('result_state', 'UNKNOWN'))")

          echo "Status final do Job: $FINAL_STATUS"

          if [ "$FINAL_STATUS" != "SUCCESS" ]; then
            echo "Erro: Job do Databricks falhou!"
            exit 1
          fi

      # 7️ Salva Run ID como artifact para auditoria
      - name: Upload Run ID artifact
        uses: actions/upload-artifact@v3
        with:
          name: databricks-run-id
          path: run_id.txt

      # 8️ Mensagem final
      - name: Success message
        run: echo "CD executado com sucesso! Job do Databricks finalizado corretamente."