name: CD/Medalhao_Pipeline_ETL

on:
  workflow_run:
    workflows: ["CI/Medalhao_Pipeline_ETL"]
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      # Debug inicial do workflow_run
      - name: Debug workflow_run event
        run: |
          echo "==== DEBUG workflow_run ===="
          echo "Nome do workflow CI: ${{ github.event.workflow_run.name }}"
          echo "Status do CI: ${{ github.event.workflow_run.conclusion }}"
          echo "Branch do CI: ${{ github.event.workflow_run.head_branch }}"
          echo "Commit do CI: ${{ github.event.workflow_run.head_sha }}"
          echo "==== FIM DEBUG ===="

      # Verificar se workflow_run existe
      - name: Check workflow_run exists
        run: |
          if [ -z "${{ github.event.workflow_run.id }}" ]; then
            echo "Erro: workflow_run não encontrado. CD não será executado."
            exit 1
          else
            echo "workflow_run detectado com sucesso: ${{ github.event.workflow_run.id }}"
          fi

      # Checkout do commit que passou no CI
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Configurar Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # Instalar dependências
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # Definir input_path
      - name: Define input_path
        run: |
          INPUT_PATH="/Volumes/saas_project/core/landing/crypto_sentiment_prediction_dataset.csv"
          echo "INPUT_PATH=$INPUT_PATH" >> $GITHUB_ENV
          echo "input_path definido: $INPUT_PATH"

      # Trigger do Job Databricks
      - name: Trigger Databricks Job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_JOB_ID: ${{ secrets.DATABRICKS_JOB_ID }}
          INPUT_PATH: ${{ env.INPUT_PATH }}
        run: |
          echo "Disparando Job $DATABRICKS_JOB_ID com input_path=$INPUT_PATH"

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
                  \"job_id\": $DATABRICKS_JOB_ID,
                  \"notebook_params\": {
                      \"input_path\": \"$INPUT_PATH\"
                  }
                }" \
            "$DATABRICKS_HOST/api/2.1/jobs/run-now")

          echo "Resposta completa do Job: $RESPONSE"

          RUN_ID=$(echo "$RESPONSE" | python -c "import sys, json; print(json.load(sys.stdin).get('run_id', ''))")
          if [ -z "$RUN_ID" ]; then
            echo "Erro: Não foi possível extrair run_id. Saindo..."
            exit 1
          fi
          echo "Run ID: $RUN_ID" > run_id.txt

      # Esperar o Job finalizar de forma segura
      - name: Wait for Databricks Job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          MAX_WAIT=1200
          ELAPSED=0
          STATUS="PENDING"
          echo "Aguardando finalização do Job..."

          while [ "$STATUS" = "RUNNING" ] || [ "$STATUS" = "PENDING" ]; do
            sleep 10
            ELAPSED=$((ELAPSED + 10))
            if [ $ELAPSED -gt $MAX_WAIT ]; then
              echo "Erro: Timeout esperando job Databricks"
              exit 1
            fi

            RESPONSE=$(curl -s -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              "$DATABRICKS_HOST/api/2.1/jobs/runs/get?run_id=$(cat run_id.txt)")

            echo "Resposta crua do Databricks:"
            echo "$RESPONSE"

            if [ -z "$RESPONSE" ]; then
              echo "Resposta vazia, aguardando..."
              continue
            fi

            STATUS=$(echo "$RESPONSE" | python -c "import sys,json; print(json.load(sys.stdin)['state']['life_cycle_state'])")
            echo "Status atual: $STATUS"
          done

          FINAL_STATUS=$(echo "$RESPONSE" | python -c "import sys,json; print(json.load(sys.stdin)['state'].get('result_state', 'UNKNOWN'))")
          echo "Status final do Job: $FINAL_STATUS"

          if [ "$FINAL_STATUS" != "SUCCESS" ]; then
            echo "Erro: Job do Databricks falhou!"
            exit 1

      # Salvar run_id como artifact
      - name: Upload Run ID artifact
        uses: actions/upload-artifact@v4
        with:
          name: databricks-run-id
          path: run_id.txt

      # Mensagem final de sucesso
      - name: Success message
        run: echo "CD executado com sucesso! Job do Databricks finalizado."