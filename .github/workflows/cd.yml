name: CD/Medalhao_Pipeline_ETL

on:
  workflow_run:
    workflows: ["CI/Medalhao_Pipeline_ETL"]
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Passo 0: Debug inicial
      # -----------------------------
      - name: Debug workflow_run event
        run: |
          echo "==== DEBUG workflow_run ===="
          echo "Nome do workflow CI: ${{ github.event.workflow_run.name }}"
          echo "Status do CI: ${{ github.event.workflow_run.conclusion }}"
          echo "Branch do CI: ${{ github.event.workflow_run.head_branch }}"
          echo "Commit do CI: ${{ github.event.workflow_run.head_sha }}"
          echo "==== FIM DEBUG ===="

      # -----------------------------
      # Passo 1: Checkout do commit
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # -----------------------------
      # Passo 2: Setup Python
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # -----------------------------
      # Passo 3: Instalar dependências
      # -----------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # -----------------------------
      # Passo 4: Trigger Databricks Job
      # -----------------------------
      - name: Trigger Databricks Job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_JOB_ID: ${{ secrets.DATABRICKS_JOB_ID }}
        run: |
          # Aqui você passa qualquer valor para o input_path
          INPUT_PATH="trigger_github"

          echo "Disparando Job $DATABRICKS_JOB_ID com input_path=$INPUT_PATH"

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
                  \"job_id\": $DATABRICKS_JOB_ID,
                  \"notebook_params\": {
                      \"input_path\": \"$INPUT_PATH\"
                  }
                }" \
            "$DATABRICKS_HOST/api/2.1/jobs/run-now")

          echo "Resposta completa do Job: $RESPONSE"

          RUN_ID=$(echo "$RESPONSE" | python -c "import sys,json; print(json.load(sys.stdin).get('run_id',''))")
          if [ -z "$RUN_ID" ]; then
            echo "Erro: Não foi possível extrair run_id. Saindo..."
            exit 1
          fi
          echo "Run ID: $RUN_ID" > run_id.txt

      # -----------------------------
      # Passo 5: Esperar Job finalizar
      # -----------------------------
      - name: Wait for Databricks Job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          MAX_WAIT=1200
          ELAPSED=0
          STATUS="PENDING"
          FINAL_STATUS="UNKNOWN"
          echo "Aguardando finalização do Job..."

          while [[ "$STATUS" == "RUNNING" || "$STATUS" == "PENDING" ]]; do
            sleep 10
            ELAPSED=$((ELAPSED + 10))
            if [ $ELAPSED -gt $MAX_WAIT ]; then
              echo "Erro: Timeout esperando job Databricks"
              exit 1
            fi

            RESPONSE=$(curl -s -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              "$DATABRICKS_HOST/api/2.1/jobs/runs/get?run_id=$(cat run_id.txt)")

            if ! echo "$RESPONSE" | grep -q '{'; then
              echo "Resposta inválida ou vazia, continuando espera..."
              continue
            fi

            STATUS=$(echo "$RESPONSE" | python -c "import sys,json; print(json.load(sys.stdin)['state']['life_cycle_state'])")
            FINAL_STATUS=$(echo "$RESPONSE" | python -c "import sys,json; print(json.load(sys.stdin)['state'].get('result_state','UNKNOWN'))")

            echo "Status atual: $STATUS | Status final conhecido: $FINAL_STATUS"
          done

          echo "Status final do Job: $FINAL_STATUS"
          if [[ "$FINAL_STATUS" == "FAILED" ]]; then
            echo "Erro: Job do Databricks falhou!"
            exit 1

      # -----------------------------
      # Passo 6: Salvar run_id como artifact
      # -----------------------------
      - name: Upload Run ID artifact
        uses: actions/upload-artifact@v4
        with:
          name: databricks-run-id
          path: run_id.txt

      # -----------------------------
      # Passo 7: Mensagem final de sucesso
      # -----------------------------
      - name: Success message
        run: echo "CD executado com sucesso! Job do Databricks finalizado com sucesso."