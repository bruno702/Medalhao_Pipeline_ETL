name: CD/Medalhao_Pipeline_ETL

on:
  workflow_run:
    workflows: ["CI/Medalhao_Pipeline_ETL"]
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:

      - name: Debug workflow_run event
        run: |
          echo "==== DEBUG workflow_run ===="
          echo "Nome do workflow CI: ${{ github.event.workflow_run.name }}"
          echo "Status do CI: ${{ github.event.workflow_run.conclusion }}"
          echo "Branch do CI: ${{ github.event.workflow_run.head_branch }}"
          echo "Commit do CI: ${{ github.event.workflow_run.head_sha }}"
          echo "==== FIM DEBUG ===="

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      # -------------------------------------------------
      # Trigger do Job
      # -------------------------------------------------
      - name: Trigger Databricks Job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_JOB_ID: ${{ secrets.DATABRICKS_JOB_ID }}
        run: |
          INPUT_PATH="trigger_github"

          echo "Disparando Job $DATABRICKS_JOB_ID com input_path=$INPUT_PATH"

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"job_id\": $DATABRICKS_JOB_ID,
              \"notebook_params\": {
                \"input_path\": \"$INPUT_PATH\"
              }
            }" \
            "$DATABRICKS_HOST/api/2.1/jobs/run-now")

          echo "Resposta completa:"
          echo "$RESPONSE"

          RUN_ID=$(echo "$RESPONSE" | python - << 'EOF'
import json,sys
try:
    data = json.load(sys.stdin)
    print(data.get("run_id",""))
except:
    print("")
EOF
)

          if [ -z "$RUN_ID" ]; then
            echo "Erro: run_id não retornado pelo Databricks"
            exit 1
          fi

          echo "$RUN_ID" > run_id.txt
          echo "Run ID: $RUN_ID"

      # -------------------------------------------------
      # Espera o Job finalizar
      # -------------------------------------------------
      - name: Wait for Databricks Job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          MAX_WAIT=1200
          ELAPSED=0
          STATUS="PENDING"
          FINAL_STATUS="UNKNOWN"

          echo "Aguardando finalização do Job..."

          while [[ "$STATUS" == "RUNNING" || "$STATUS" == "PENDING" ]]; do

            sleep 10
            ELAPSED=$((ELAPSED + 10))

            if [ $ELAPSED -gt $MAX_WAIT ]; then
              echo "Erro: timeout esperando job Databricks"
              exit 1
            fi

            RESPONSE=$(curl -s \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              "$DATABRICKS_HOST/api/2.1/jobs/runs/get?run_id=$(cat run_id.txt)")

            STATUS=$(echo "$RESPONSE" | python - << 'EOF'
import json,sys
try:
    d=json.load(sys.stdin)
    print(d["state"]["life_cycle_state"])
except:
    print("PENDING")
EOF
)

            FINAL_STATUS=$(echo "$RESPONSE" | python - << 'EOF'
import json,sys
try:
    d=json.load(sys.stdin)
    print(d["state"].get("result_state","UNKNOWN"))
except:
    print("UNKNOWN")
EOF
)

            echo "Status atual: $STATUS | Status final: $FINAL_STATUS"

          done

          echo "Status final do Job: $FINAL_STATUS"

          if [[ "$FINAL_STATUS" == "FAILED" ]]; then
            echo "Erro: Job do Databricks falhou"
            exit 1
          fi

      - name: Upload Run ID artifact
        uses: actions/upload-artifact@v4
        with:
          name: databricks-run-id
          path: run_id.txt

      - name: Success message
        run: echo "CD finalizado com sucesso"